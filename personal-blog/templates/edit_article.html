{% extends "base.html" %}

{% block title %}Edit Article - My Blog{% endblock %}

{% block content %}
<div class="article-form">
    <header class="form-header">
        <h1>Edit Article</h1>
    </header>
    
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    {% if article %}
    <form method="POST" action="/admin/article/{{ article.id }}/edit">
        <div class="form-group">
            <label for="id">Article ID (slug)</label>
            <input type="text" id="id" name="article_id" value="{{ article.id }}" readonly />
            <small>Article ID cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ article.title }}" required />
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="10" required>{{ article.content }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" value="{{ article.author }}" required />
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    {% endif %}
</div>
{% endblock %}
