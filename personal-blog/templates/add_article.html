{% extends "base.html" %}

{% block title %}Add Article - My Blog{% endblock %}

{% block content %}
<div class="article-form">
    <header class="form-header">
        <h1>Add New Article</h1>
    </header>
    
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="/admin/article/new">
        <div class="form-group">
            <label for="id">Article ID (slug)</label>
            <input type="text" id="id" name="article_id" placeholder="my-first-post" required />
            <small>Use lowercase letters, numbers, and hyphens only</small>
        </div>
        
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Article Title" required />
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="10" placeholder="Write your article content here..." required></textarea>
        </div>
        
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" value="Jaimz" required />
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Publish Article</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
